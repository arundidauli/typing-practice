name: Publish static site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 'pages-publish'
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and build
        run: npm ci && npm run build

      - name: Copy build for GitHub Pages (root + docs)
        run: |
          rm -rf docs assets
          cp -r dist docs
          cp dist/index.html index.html
          cp -r dist/assets assets
          cp dist/favicon.svg favicon.svg
          cp dist/icons.svg icons.svg
          cp dist/.nojekyll .nojekyll

      - name: Commit published files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: publish static build for GitHub Pages [skip ci]'
          file_pattern: |
            index.html
            assets/**
            docs/**
            favicon.svg
            icons.svg
            .nojekyll
